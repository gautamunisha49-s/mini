<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post | Mini Media</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #FBC5CD;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .card {
            width: 500px;
            background: #FAF6EE;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .15);
        }

        h2 {
            text-align: center;
            color: #4A3933;
            margin-bottom: 25px;
        }

        .image-box {
            text-align: center;
            margin-bottom: 20px;
        }

        .image-box img {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
            border-radius: 15px;
            border: 2px solid #FBC5CD;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #4A3933;
        }

        textarea {
            width: 100%;
            height: 120px;
            resize: none;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 12px;
            font-size: 15px;
            outline: none;
            margin-bottom: 20px;
        }

        textarea:focus {
            border-color: #E08E9B;
        }

        input[type=file] {
            width: 100%;
            margin-bottom: 25px;
        }

        .buttons {
            display: flex;
            gap: 15px;
        }

        .save-btn,
        .cancel-btn {
            flex: 1;
            text-align: center;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            transition: .3s;
        }

        .save-btn {
            background: #E08E9B;
            color: white;
            border: none;
            cursor: pointer;
        }

        .save-btn:hover {
            background: #cf7584;
        }

        .cancel-btn {
            background: white;
            color: #E08E9B;
            border: 2px solid #E08E9B;
        }

        .cancel-btn:hover {
            background: #E08E9B;
            color: white;
        }
    </style>
</head>

<body>

    <div class="card">

        <h2><i class="bi bi-pencil-square"></i> Edit Post</h2>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            {% if post.image %}
            <div class="image-box">
                <img src="{{ post.image.url }}" alt="Post Image">
            </div>
            {% endif %}

            <label>Caption</label>

            <textarea name="caption">{{ post.caption }}</textarea>

            <label>Change Image (Optional)</label>

            <input type="file" name="image">

            <div class="buttons">

                <button type="submit" class="save-btn">
                    <i class="bi bi-check-circle-fill"></i>
                    Save Changes
                </button>

                <a href="{% url 'home' %}" class="cancel-btn">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</body>

</html>
