{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Clone - Home</title>
    <style>
        /* बेसिक ब्याकग्राउन्ड र फन्ट सेटिङ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
        }

        /* साइडबारको स्टाइल - आइकनहरू नभत्किउन् भन्नका लागि */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: 75px;
            background-color: #000000;
            border-right: 1px solid #262626;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            z-index: 100;
        }

        /* मुख्य आइकनहरूको साइज फिक्स गर्ने (तिम्रो ठूलो देखिएको समस्या यसले समाधान गर्छ) */
        .nav-icon {
            width: 24px;
            height: 24px;
            stroke: #ffffff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            cursor: pointer;
            transition: transform 0.2s ease, stroke 0.2s ease;
            margin-bottom: 35px;
        }

        .nav-icon:hover {
            transform: scale(1.1);
            stroke: #fa7e1e; /* होभर गर्दा इन्स्टाग्राम कलर थिम */
        }

        /* साइडबारको तल लगआउट बटन पुश गर्न */
        .logout-link {
            margin-top: auto;
            margin-bottom: 25px;
        }

        /* मुख्य कन्टेन्ट एरिया (फिड) */
        .main-content {
            margin-left: 75px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            margin-right: auto;
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 40px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-box {
            background-color: #121212;
            border: 1px solid #262626;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
        }

        .welcome-box h2 {
            margin-bottom: 10px;
            font-size: 20px;
        }

        .welcome-box p {
            color: #a8a8a8;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <a href="{% url 'home' %}">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </a>
        
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
        
        <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        
        <svg class="nav-icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        
        <svg class="nav-icon profile-fallback" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        
        <a href="{% url 'logout' %}" title="Logout" class="logout-link">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        </a>
    </nav>

    <main class="main-content">
        <h1 class="header-title">Instagram</h1>
        
        <div class="welcome-box">
            <h2>Welcome to your Feed, {{ request.user.username }}! 👋</h2>
            <p>Here you'll see posts from the people you follow. Start exploring and connecting with your all  friends!</p>
            
        </div>
    </main>

</body>
</html>
