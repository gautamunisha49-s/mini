{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Minimedia</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
        }

        /* 1. Light Mode Default Colors */
        :root {
            --bg-color: #FBC5CD;
            --text-color: #4A1521;
            --box-bg: #ffffff;
            --input-bg: #fafafa;
            --input-border: rgba(74,21,33,.2);
            --switch-text: #333333;
        }

        /* 2. Dark Mode Overrides */
        /* .dark, [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #FAF6EE;
            --box-bg: #1E1E1E;
            --input-bg: #2d2d2d;
            --input-border: #444444;
            --switch-text: #aaaaaa;
        } */

        body{
            background: var(--bg-color);
            min-height: 100vh;
            color: var(--text-color);
            transition: background 0.2s ease, color 0.2s ease;
        }

        .page{
            width:100%;
            min-height:100vh;
            background: var(--bg-color);
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:40px 90px; /* साइडको इन्डेन्ट बढाएर दूरी मिलाएको */
        }

        .left{
            width:50%;
        }

        .right{
            width:50%;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content: center;
        }

        .quote{
            margin-left:40px;
            font-size: 45px;
            font-family: Georgia,serif;
            font-weight:bold;
        }

        .quote h1{
            font-size:45px;
            font-family:Georgia,serif;
            line-height:1.25;
            color:#22070e;
            font-weight:bold;
            margin-left: 80px; /* साइडको इन्डेन्ट बढाएर दूरी मिलाएको */
        }
        .quote span{
            color:#ba6b7d;
        }

        .art{
            margin-top:50px;
            position:relative;
            width:420px;
            height:330px;
        }

        .hearts{
            position:absolute;
            left:-35px;
            top:45px;
            width:120px;
            z-index:3;
        }

        .back-photo{
            position:absolute;
            left:80px;
            top:55px;
            width:180px;
            opacity:.80;
            transform:rotate(-20deg);
            border-radius:25px;
            
        }

        .phone{
            position:absolute;
            left:165px;
            top:0;
            width:190px;
            z-index:2;
            border-radius:25px;
            border-color: #853b4d;
        }

        /* RIGHT SIDE CSS FIXES */
        .auth-container{
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .box{
            width:400px;
            background: white;
            padding: 45px;
            border-radius:25px;
            box-shadow: 0 10px 30px rgba(74,21,33,0.05); /* हल्का प्रिमियम स्याडो */
            margin-bottom: 20px; /* 🛠️ १५० पिक्सलबाट घटाएर २० पिक्सल बनाएको ताकि स्वीच बक्स माथि आओस् */
        }

        .logo{
            font-size:40px;
            font-weight:900;
            color:#4A1521;
            margin-bottom:40px;
            text-align: center;
        }

        input{
            width:100%;
            height:50px;
            margin-bottom:18px;
            border-radius:8px;
            border:1px solid #ddd;
            padding-left:15px;
            background: var(--input-bg);
            color: var(--text-color);
        }

        button{
            width:100%;
            height:50px;
            background:#541523;
            color:white;
            border:none;
            border-radius:8px;
            font-size:20px;
            font-weight:bold;
            cursor: pointer;
        }

        .switch-box{
            width:400px;
            background: white;
            border-radius:22px;
            padding:22px;
            text-align:center;
            box-shadow: 0 4px 15px rgba(74,21,33,0.03);
        }

        .switch-box a{
            color: var(--text-color);
            font-weight: 700;
            text-decoration: none;
            margin-left: 3px;
        }

        .switch-box a:hover {
            text-decoration: underline;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 45px;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-color);
            opacity: 0.6;
            font-size: 18px;
            transition: opacity 0.15s ease;
        }

        .toggle-password:hover {
            opacity: 1;
        }
        
    </style>

    <!-- <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script> -->

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('bi-eye-slash-fill');
                icon.classList.add('bi-eye-fill');
            } else {
                input.type = 'password';
                icon.classList.remove('bi-eye-fill');
                icon.classList.add('bi-eye-slash-fill');
            }
        }
    </script>
</head>

<body>

<div class="page">

    <div class="left">
        <div class="quote">
            <h1 class="line1">The creative minds</h1>
            <h1 class="line2">behind the screen.</h1>
        </div>

        <div class="art">
            <img src="{% static 'images/heart.jpg' %}" class="hearts" alt="hearts">

            <img src="{% static 'images/sit.jpg' %}" class="back-photo" alt="back-photo">

            <img src="{% static 'images/main.jpg' %}" class="phone" alt="phone">
        </div>
    </div>

    <div class="right">
        <div class="auth-container">
            
            <div class="box">
                <div class="logo">MINIMEDIA</div>

                {% if error %}
                <div class="error">{{ error }}</div>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    <input type="text" name="username" placeholder="Username" required>
                    <div class="password-wrapper">
                        <input type="password" name="password" id="login-password" placeholder="Password" required>
                        <i class="bi bi-eye-slash-fill toggle-password" id="login-password-toggle" onclick="togglePassword('login-password', 'login-password-toggle')"></i>
                    </div>
                    <button type="submit">Login</button>
                </form>
            </div>

            <div class="switch-box">
                Don't have an account?
                <a href="{% url 'register' %}">Sign up</a>
            </div>

        </div>
    </div>

</div>

</body>
</html>
