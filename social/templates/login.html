<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | MiniMedia</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #FBC5CD;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .logo {
      text-align: center;
      font-size: 40px;
      font-weight: bold;
      color: #4A3933;
      margin-bottom: 10px;
    }

    .logo span {
      color: #E08E9B;
    }

    .subtitle {
      text-align: center;
      color: #777;
      margin-bottom: 30px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #4A3933;
    }

    .input-box {
      position: relative;
    }

    .input-box i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #888;
    }

    .input-box input {
      width: 100%;
      padding: 14px 14px 14px 45px;
      border: 1px solid #ddd;
      border-radius: 12px;
      outline: none;
      font-size: 15px;
    }

    .input-box input:focus {
      border-color: #E08E9B;
      box-shadow: 0 0 0 3px rgba(224, 142, 155, .2);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #E08E9B;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: .3s;
    }

    .login-btn:hover {
      background: #d97887;
    }

    .register-link {
      text-align: center;
      margin-top: 20px;
      color: #555;
    }

    .register-link a {
      color: #E08E9B;
      text-decoration: none;
      font-weight: bold;
    }

    .register-link a:hover {
      text-decoration: underline;
    }

    .errorlist {
      color: red;
      font-size: 13px;
      margin-bottom: 10px;
      list-style: none;
    }
  </style>
</head>

<body>

  <div class="login-container">

    <div class="card">

      <div class="logo">
        Mini<span>Media</span>
      </div>

      <p class="subtitle">
        Welcome back! Login to continue.
      </p>

      <form method="POST">

        {% csrf_token %}

        <div class="input-group">
          <label>Username</label>

          <div class="input-box">
            <i class="bi bi-person"></i>
            <input type="text" name="username" placeholder="Enter username" required>
          </div>
        </div>

        <div class="input-group">
          <label>Password</label>

          <div class="input-box">
            <i class="bi bi-lock"></i>
            <input type="password" name="password" placeholder="Enter password" required>
          </div>
        </div>

        <button type="submit" class="login-btn">
          Login
        </button>

      </form>

      <div class="register-link">
        Don't have an account?
        <a href="{% url 'register' %}">
          Register
        </a>
      </div>

    </div>

  </div>

</body>

</html>
