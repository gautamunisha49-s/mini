{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Minimedia</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
        }

        body{
            background:#FBC5CD;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .auth-container{
            width:100%;
            max-width:350px;
        }

        .box{
            background:#fff;
            padding:30px;
            border-radius:8px;
            text-align:center;
            box-shadow:0 4px 12px rgba(0,0,0,.05);
        }

        .logo{
            font-size:28px;
            font-weight:800;
            color:#4A1521;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px 12px;
            margin-bottom:10px;
            border:1px solid rgba(74,21,33,.2);
            border-radius:4px;
            outline:none;
            background:#fafafa;
        }

        input:focus{
            border-color:#4A1521;
        }

        button{
            width:100%;
            background:#4A1521;
            color:white;
            border:none;
            padding:10px;
            border-radius:4px;
            font-weight:700;
            cursor:pointer;
        }

        .error{
            color:red;
            margin-bottom:10px;
            font-size:13px;
        }

        .switch-box{
            margin-top:10px;
            background:#fff;
            padding:20px;
            text-align:center;
            border-radius:8px;
        }

        .switch-box a{
            color:#4A1521;
            font-weight:700;
            text-decoration:none;
        }
    </style>
</head>

<body>

<div class="auth-container">

    <div class="box">

        <div class="logo">MINIMEDIA</div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username">

            <input type="password" name="password" placeholder="Password">

            <button type="submit">Login</button>

        </form>

    </div>

    <div class="switch-box">
        Don't have an account?
        <a href="{% url 'register' %}">Sign up</a>
    </div>

</div>

</body>
</html>
