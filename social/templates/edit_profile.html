<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile • MiniMedia</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: #FBC5CD;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .title {
            text-align: center;
            color: #4A1521;
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #777;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4A1521;
        }

        textarea,
        input[type="file"] {
            width: 100%;
        }

        textarea {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 12px;
            resize: none;
            font-size: 14px;
            outline: none;
        }

        textarea:focus {
            border-color: #4A1521;
        }

        .preview {
            text-align: center;
            margin-bottom: 20px;
        }

        .preview img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #FBC5CD;
        }

        .save-btn {
            width: 100%;
            background: #4A1521;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: .3s;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            opacity: .95;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="card">

            <h1 class="title">Edit Profile</h1>

            <p class="subtitle">
                Update your profile information
            </p>

            <div class="preview">

                {% if profile.profile_picture %}
                <img src="{{ profile.profile_picture.url }}" alt="Profile">
                {% else %}
                <img src="https://via.placeholder.com/120" alt="Profile">
                {% endif %}

            </div>

            <form method="POST" enctype="multipart/form-data">

                {% csrf_token %}

                <div class="form-group">
                    <label>Bio</label>

                    <textarea name="bio" rows="5"
                        placeholder="Tell people about yourself...">{{ profile.bio }}</textarea>
                </div>

                <div class="form-group">
                    <label>Change Profile Picture</label>

                    <input type="file" name="profile_picture">
                </div>

                <button type="submit" class="save-btn">
                    Save Changes
                </button>

            </form>

        </div>

    </div>

</body>

</html>
