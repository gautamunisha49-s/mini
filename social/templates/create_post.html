<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Media - {% if post %}Edit{% else %}Create{% endif %} Post</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
    /* 🎯 पूरै पेजको ब्याकग्राउन्डलाई पिङ्क (#FBC5CD) बनाउने */
    body { 
        background-color: #FBC5CD; 
        color: #4A3933;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    
    /* ब्रान्ड कलर (यदि कतै क्लास युज भएको छ भने) */
    .bg-brand { 
        background-color: #FBC5CD; 
    }

    /* 📝 पोस्ट क्रिएट गर्ने बक्स/फर्मलाई बिचमा चिटिक्क पार्ने (चाहिएमा) */
    .create-post-container {
        background-color: #FAF6EE; /* फर्म बक्स चाहिँ सफा म्याट क्रिम */
        border: 1px solid #E4DDD3;
        border-radius: 12px;
        padding: 30px;
        max-width: 500px;
        margin: 50px auto;
        box-shadow: 0 4px 15px rgba(74, 57, 51, 0.1);
    }

    /* इनपुट र बटनहरूको स्टाइल तिम्रो थिम अनुसार */
    input, textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #E4DDD3;
        border-radius: 8px;
        background-color: #ffffff;
        color: #4A3933;
    }

    .submit-btn {
        background-color: #4A3933;
        color: #FBC5CD;
        padding: 12px 24px;
        border: none;
        border-radius: 20px;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
    }

    .submit-btn:hover {
        background-color: #332621;
    }
</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white border border-brand/60 rounded-2xl shadow-md p-6">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">
            {% if post %}<i class="bi bi-pencil-square text-[#E08E9B]"></i> Edit Post{% else %}<i class="bi bi-plus-circle text-[#E08E9B]"></i> Share a Moment{% endif %}
        </h2>

        <form method="post" enctype="multipart/form-data" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Choose Image</label>
                {% if post %}
                    <p class="text-xs text-gray-400 mb-2">Current: <a href="{{ post.image.url }}" target="_blank" class="text-blue-500 underline">View Image</a></p>
                {% endif %}
                <input type="file" name="image" accept="image/*" {% if not post %}required{% endif %}
                       class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-brand/20 file:text-gray-700 hover:file:bg-brand/30 cursor-pointer">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Caption</label>
                <textarea name="caption" rows="4" placeholder="Write something beautiful..." maxlength="500"
                          class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand resize-none">{% if post %}{{ post.caption }}{% endif %}</textarea>
            </div>

            <div class="flex gap-3 pt-2">
                <a href="{% url 'home' %}" class="w-1/2 text-center bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-3 rounded-xl transition">Cancel</a>
                <button type="submit" class="w-1/2 bg-brand hover:bg-[#f9abb6] text-gray-700 font-bold py-3 rounded-xl shadow-sm transition cursor-pointer">
                    {% if post %}Update{% else %}Publish{% endif %}
                </button>
            </div>
        </form>
    </div>

</body>
</html>
