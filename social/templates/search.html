<!DOCTYPE html>
<html>

<head>
    <title>Search Users</title>
</head>

<body>

    <h1>Search Users</h1>

    <form method="GET">

        <input type="text" name="q" placeholder="Search username" value="{{ query }}">

        <button type="submit">
            Search
        </button>

    </form>

    <hr>

    {% for user in users %}

    <div>

        <a href="{% url 'profile' user.id %}">
            {{ user.username }}
        </a>

    </div>

    <br>

    {% empty %}

    <p>No users found.</p>

    {% endfor %}

</body>

</html>
