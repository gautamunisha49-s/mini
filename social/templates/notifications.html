<!DOCTYPE html>
<html>
<head>
<title>Notifications</title>
</head>
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
    background:#FBC5CD;
    padding:40px;
}

.container{
    max-width:700px;
    margin:auto;
}

.page-title{
    text-align:center;
    color:#4A1521;
    margin-bottom:25px;
}

.notification-box{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.notification-item{
    padding:15px;
    border-bottom:1px solid #eee;
    display:flex;
    align-items:center;
    gap:12px;
}

.notification-item:last-child{
    border-bottom:none;
}

.notification-avatar{
    width:50px;
    height:50px;
    border-radius:50%;
    object-fit:cover;
}

.notification-content{
    flex:1;
}

.notification-content p{
    color:#333;
}

.notification-time{
    font-size:12px;
    color:#777;
    margin-top:4px;
}

.empty{
    text-align:center;
    color:#666;
    padding:30px;
}
</style>

<body>

<h2>Notifications</h2>


{% for n in notifications %}

<p>
{{ n.message }}
</p>

<small>
{{ n.created_at }}
</small>

<hr>


{% empty %}

<p>No notifications</p>


{% endfor %}



</body>
</html>
